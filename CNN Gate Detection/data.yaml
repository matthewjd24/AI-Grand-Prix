# data.yaml — YOLO-pose config for drone-gate corner detection

path: C:\Users\matt\Desktop\CNN\dataset   # dataset root
train: images/train                       # relative to path
val: images/val                           # relative to path

# Keypoints: 4 corners per gate, 3 values each (x, y, visibility)
kpt_shape: [4, 3]

# Corner order TL, TR, BL, BR. Horizontal flip swaps TL<->TR, BL<->BR.
flip_idx: [1, 0, 3, 2]

names:
  0: gate